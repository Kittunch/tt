<!DOCTYPE html>
<html>
<head>
    <title>Eaglercraft</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        
        #main {
            width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        #header {
            height: 50px;
            background-color: #333;
            color: #fff;
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #333;
        }
        
        #header h1 {
            margin: 0;
        }
        
        #content {
            padding: 20px;
        }
        
        #content h2 {
            margin-top: 20px;
        }
        
        #footer {
            clear: both;
            padding: 10px;
            background-color: #333;
            color: #fff;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="main">
        <div id="header">
            <h1>Eaglercraft</h1>
        </div>
        <div id="content">
            <h2>Player Information</h2>
            <p>Username: <span id="username"></span></p>
            <p>Experience: <span id="experience"></span></p>
            <p>Experience Level: <span id="experience_level"></span></p>
            <p>Health: <span id="health"></span></p>
            <p>Hunger: <span id="hunger"></span></p>
            <p>Speed: <span id="speed"></span></p>
            <p>Damage: <span id="damage"></span></p>
        </div>
        <div id="footer">
            <p>&copy; 2023 Eaglercraft</p>
        </div>
    </div>
    
    <script>
        // 获取 player 信息
        const player = new EaglercraftPlayer(new EaglercraftWorld("world", new MinecraftServer()), "player");
        document.getElementById("username").innerHTML = player.username;
        document.getElementById("experience").innerHTML = player.experience;
        document.getElementById("experience_level").innerHTML = player.experienceLevel;
        document.getElementById("health").innerHTML = player.health;
        document.getElementById("hunger").innerHTML = player.hunger;
        document.getElementById("speed").innerHTML = player.speed;
        document.getElementById("damage").innerHTML = player.damage;
        
        // 添加事件监听器
        document.addEventListener("click", function(event) {
            // 提示信息
            alert("点击了页面");
        });
        
        // 添加定时器
        setInterval(function() {
            // 更新 player 信息
            document.getElementById("username").innerHTML = player.username;
            document.getElementById("experience").innerHTML = player.experience;
            document.getElementById("experience_level").innerHTML = player.experienceLevel;
            document.getElementById("health").innerHTML = player.health;
            document.getElementById("hunger").innerHTML = player.hunger;
            document.getElementById("speed").innerHTML = player.speed;
            document.getElementById("damage").innerHTML = player.damage;
        }, 1000);
        
        // 添加 Ajax 请求
        $.ajax({
            type: "GET",
            url: "https://api.eaglercraft.com/player",
            dataType: "json",
            success: function(data) {
                // 更新 player 信息
                document.getElementById("username").innerHTML = data.username;
                document.getElementById("experience").innerHTML = data.experience;
                document.getElementById("experience_level").innerHTML = data.experienceLevel;
                document.getElementById("health").innerHTML = data.health;
                document.getElementById("hunger").innerHTML = data.hunger;
                document.getElementById("speed").innerHTML = data.speed;
                document.getElementById("damage").innerHTML = data.damage;
            },
            error: function(xhr, status, error) {
                // 提示错误信息
                alert("Error: " + error);
            }
        });
        
        // 添加 WebSocket 连接
        var socket = new WebSocket("wss://api.eaglercraft.com/player");
        socket.onmessage = function(event) {
            // 更新 player 信息
            document.getElementById("username").innerHTML = event.data.username;
            document.getElementById("experience").innerHTML = event.data.experience;
            document.getElementById("experience_level").innerHTML = event.data.experienceLevel;
            document.getElementById("health").innerHTML = event.data.health;
            document.getElementById("hunger").innerHTML = event.data.hunger;
