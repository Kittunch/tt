<!DOCTYPE html>
<html>
<head>
    <title>Eaglercraft</title>
    <style>
        /* ... */
    </style>
</head>
<body>
    <div id="main">
        <!-- ... -->
    </div>
    
    <script>
        // Eaglescraft init
        Eaglercraft.init({
            version: "1.12",
            server: "eaglercraft.com",
            player: {
                username: "player",
                experience: 0,
                experienceLevel: 0,
                health: 20,
                hunger: 20,
                speed: 1,
                damage: 1
            }
        });
        
        // canvas init
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        canvas.width = 800;
        canvas.height = 600;
        
        // draw function
        function draw() {
            // clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // draw background
            ctx.fillStyle = "#f0f0f0";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // draw player
            ctx.fillStyle = "#000";
            ctx.fillRect(player.x, player.y, 20, 20);
            
            // draw entities
            for (const entity of entities) {
                ctx.fillStyle = "#000";
                ctx.fillRect(entity.x, entity.y, 20, 20);
            }
            
            // draw UI
            ctx.fillStyle = "#000";
            ctx.font = "24px Arial";
            ctx.textAlign = "left";
            ctx.textBaseline = "top";
            ctx.fillText("Username: " + player.username, 10, 10);
            ctx.fillText("Experience: " + player.experience, 10, 40);
            ctx.fillText("Experience Level: " + player.experienceLevel, 10, 70);
            ctx.fillText("Health: " + player.health, 10, 100);
            ctx.fillText("Hunger: " + player.hunger, 10, 130);
            ctx.fillText("Speed: " + player.speed, 10, 160);
            ctx.fillText("Damage: " + player.damage, 10, 190);
        }
        
        // main loop
        function loop() {
            // update player
            player.update();
            
            // update entities
            for (const entity of entities) {
                entity.update();
            }
            
            // draw
            draw();
            
            // requestAnimationFrame
            requestAnimationFrame(loop);
        }
        
        // start loop
        loop();
    </script>
    
    <canvas id="canvas"></canvas>
</body>
</html>
